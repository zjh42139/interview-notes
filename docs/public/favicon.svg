<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32">
      <stop offset="0%" stop-color="#3451b2"/>
      <stop offset="100%" stop-color="#5c73e7"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect x="1" y="1" width="30" height="30" rx="7" fill="url(#bg)"/>
  <!-- 左括号 -->
  <text x="7" y="22" font-family="Consolas,monospace" font-size="18" font-weight="bold" fill="white">&#60;</text>
  <!-- 右括号 -->
  <text x="25" y="22" font-family="Consolas,monospace" font-size="18" font-weight="bold" fill="white" text-anchor="end">&#62;</text>
  <!-- 斜杠 -->
  <text x="16" y="21" font-family="Consolas,monospace" font-size="17" font-weight="bold" fill="rgba(255,255,255,0.85)" text-anchor="middle">/</text>
</svg>
